# Build + deploy the admin SPA (apps/admin) to the PROD Firebase Hosting site.
# Manual trigger only (workflow_dispatch) — prod releases are deliberate.
#
# Every key/id/URL differs between dev and prod. This workflow reads ADMIN_PROD_*
# variables and the GCP_SA_KEY_PROD secret; it shares nothing with the dev workflow.
#
# ONE-TIME SETUP (prod):
#   firebase hosting:sites:create agent-researcher-prod-admin --project sinuous-canto-497518-h7
#   gh variable set ADMIN_PROD_API_BASE_URL     --body "https://<prod-cloud-run-api-url>"
#   gh variable set ADMIN_PROD_GOOGLE_CLIENT_ID --body "<prod-oauth-client-id>.apps.googleusercontent.com"
#   gh secret set GCP_SA_KEY_PROD < prod-sa-key.json   # may equal the dev key if same project
#
name: Deploy admin SPA (prod)

on:
  workflow_dispatch: {}

concurrency:
  group: deploy-admin-prod
  cancel-in-progress: false

permissions:
  contents: read

env:
  GCP_PROJECT_ID: sinuous-canto-497518-h7

jobs:
  deploy-admin-prod:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build admin SPA (prod config)
        env:
          VITE_API_BASE_URL: ${{ vars.ADMIN_PROD_API_BASE_URL }}
          VITE_ADMIN_GOOGLE_CLIENT_ID: ${{ vars.ADMIN_PROD_GOOGLE_CLIENT_ID }}
        run: npm run build -w @agent-researcher/admin

      - name: Authenticate to Google Cloud (prod service-account key)
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          credentials_json: ${{ secrets.GCP_SA_KEY_PROD }}

      - name: Deploy to Firebase Hosting (prod site)
        working-directory: apps/admin
        run: npx --yes firebase-tools deploy --only hosting:admin-prod --project "${GCP_PROJECT_ID}" --non-interactive
